name: statsmodels.garch
version: 1
description: Fit a GARCH(p,q) model to a return series using the arch package and return parameters, conditional volatility, and AIC.
category: time_series
tags: [garch, volatility, arch, time-series, numpy]

inputs:
  returns:
    schema: NumpyArray
    required: true
    description: 1-D array of return values (e.g. log-returns).
  p:
    schema: Integer
    required: true
    description: GARCH lag order p.
  q:
    schema: Integer
    required: true
    description: ARCH lag order q.

outputs:
  params:
    schema: NumpyArray
    description: Fitted model parameters.
  conditional_volatility:
    schema: NumpyArray
    description: Estimated conditional volatility series.
  aic:
    schema: Float
    description: Akaike Information Criterion of the fitted model.

implementation:
  language: python
  entry_point: tool.py:run
  requires: [numpy, arch]

metadata:
  author: plurics-seeds
  stability: stable
  cost_class: medium
