name: sympy.differentiate
version: 1
change_type: net_new
description: Compute the derivative of a symbolic expression with respect to a variable.
category: symbolic_math
tags: [sympy, symbolic, differentiation, calculus]

inputs:
  expr:
    schema: SymbolicExpr
    required: true
    description: Symbolic expression to differentiate.
  variable:
    schema: String
    required: true
    description: Name of the variable to differentiate with respect to.

outputs:
  result:
    schema: SymbolicExpr
    description: Derivative of the symbolic expression.

implementation:
  language: python
  entry_point: tool.py:run
  requires: [sympy]

metadata:
  author: plurics-seeds
  stability: stable
  cost_class: fast
