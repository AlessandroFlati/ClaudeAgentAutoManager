name: sklearn.gaussian_mixture
version: 1
description: Gaussian Mixture Model clustering — probabilistic clustering of NumpyArray data.
category: clustering
tags: [gaussian-mixture, gmm, clustering, scikit-learn, numpy]

inputs:
  X:
    schema: NumpyArray
    required: true
    description: Input data matrix (n_samples x n_features).
  n_components:
    schema: Integer
    required: true
    description: Number of mixture components.

outputs:
  labels:
    schema: NumpyArray
    description: Component labels for each sample (n_samples,).
  means:
    schema: NumpyArray
    description: Means of each mixture component (n_components x n_features).
  bic:
    schema: Float
    description: Bayesian Information Criterion value.

implementation:
  language: python
  entry_point: tool.py:run
  requires: [numpy, scikit-learn]

metadata:
  author: plurics-seeds
  stability: stable
  cost_class: medium
