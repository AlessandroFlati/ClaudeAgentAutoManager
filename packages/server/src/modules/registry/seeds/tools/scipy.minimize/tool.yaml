name: scipy.minimize
version: 1
description: Minimize a scalar function of one or more variables using scipy.optimize.minimize. The objective function is selected by name from the built-in function registry.
category: optimization
tags: [optimization, minimize, scipy, numpy]

inputs:
  x0:
    schema: NumpyArray
    required: true
    description: Initial guess for the minimizer (1-D array).
  method:
    schema: String
    required: true
    description: Optimization method (e.g. 'Nelder-Mead', 'BFGS', 'L-BFGS-B').
  func_name:
    schema: String
    required: true
    description: "Name of the objective function from the built-in registry. Available: rosenbrock, quadratic, sphere."

outputs:
  x:
    schema: NumpyArray
    description: Solution array at the minimum.
  fun:
    schema: Float
    description: Value of objective function at the minimum.
  success:
    schema: Boolean
    description: Whether the optimizer converged successfully.
  message:
    schema: String
    description: Description of the cause of termination.

implementation:
  language: python
  entry_point: tool.py:run
  requires: [numpy, scipy]

metadata:
  author: plurics-seeds
  stability: stable
  cost_class: medium
