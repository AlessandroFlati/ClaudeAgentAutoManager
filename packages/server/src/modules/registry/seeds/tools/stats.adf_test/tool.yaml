name: stats.adf_test
version: 1
description: Perform the Augmented Dickey-Fuller unit root test for stationarity.
category: hypothesis_testing
inputs:
  values:
    schema: NumpyArray
    required: true
    description: Time series (1-D array of numbers).
outputs:
  statistic:
    schema: Float
    description: ADF test statistic.
  p_value:
    schema: Float
    description: MacKinnon approximate p-value.
  used_lag:
    schema: Integer
    description: Number of lags used in the test.
  critical_values:
    schema: JsonObject
    description: Critical values at 1%, 5%, and 10% significance levels.
implementation:
  language: python
  entry_point: tool.py:run
