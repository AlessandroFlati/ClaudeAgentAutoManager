name: test.numpy_sum
version: 1
change_type: net_new
description: Sum a JSON list of numbers and return both the array and the sum.
category: testing
inputs:
  values:
    schema: JsonArray
    required: true
outputs:
  array:
    schema: NumpyArray
  sum:
    schema: Float
implementation:
  language: python
  entry_point: tool.py:run
  requires:
    - numpy
