name: scipy.root_finding
version: 1
description: Find the root of a scalar function using scipy.optimize.root. The function is selected by name from the built-in function registry.
category: optimization
tags: [optimization, root-finding, scipy, numpy]

inputs:
  x0:
    schema: NumpyArray
    required: true
    description: Initial guess for the root (1-D array).
  method:
    schema: String
    required: true
    description: Root-finding method (e.g. 'hybr', 'lm', 'broyden1').
  func_name:
    schema: String
    required: true
    description: "Name of the function from the built-in registry. Available: quadratic_shift, cubic, linear_system."

outputs:
  x:
    schema: NumpyArray
    description: Solution array (root).
  success:
    schema: Boolean
    description: Whether the root-finding converged successfully.

implementation:
  language: python
  entry_point: tool.py:run
  requires: [numpy, scipy]

metadata:
  author: plurics-seeds
  stability: stable
  cost_class: medium
