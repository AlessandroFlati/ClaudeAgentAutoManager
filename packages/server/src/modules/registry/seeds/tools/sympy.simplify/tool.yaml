name: sympy.simplify
version: 1
description: Simplify a symbolic mathematical expression using SymPy.
category: symbolic_math
tags: [sympy, symbolic, simplify, algebra]

inputs:
  expr:
    schema: SymbolicExpr
    required: true
    description: Symbolic expression to simplify.

outputs:
  result:
    schema: SymbolicExpr
    description: Simplified symbolic expression.

implementation:
  language: python
  entry_point: tool.py:run
  requires: [sympy]

metadata:
  author: plurics-seeds
  stability: stable
  cost_class: fast
