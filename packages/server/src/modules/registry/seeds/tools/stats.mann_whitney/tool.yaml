name: stats.mann_whitney
version: 1
description: Perform the Mann-Whitney U rank test (non-parametric two-sample test).
category: hypothesis_testing
inputs:
  a:
    schema: NumpyArray
    required: true
    description: First sample (1-D array of numbers).
  b:
    schema: NumpyArray
    required: true
    description: Second sample (1-D array of numbers).
outputs:
  statistic:
    schema: Float
    description: U statistic.
  p_value:
    schema: Float
    description: Two-sided p-value.
implementation:
  language: python
  entry_point: tool.py:run
