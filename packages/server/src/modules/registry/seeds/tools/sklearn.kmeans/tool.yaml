name: sklearn.kmeans
version: 1
description: K-Means clustering — partition NumpyArray data into n_clusters clusters.
category: clustering
tags: [kmeans, clustering, scikit-learn, numpy]

inputs:
  X:
    schema: NumpyArray
    required: true
    description: Input data matrix (n_samples x n_features).
  n_clusters:
    schema: Integer
    required: true
    description: Number of clusters to form.

outputs:
  labels:
    schema: NumpyArray
    description: Cluster labels for each sample (n_samples,).
  centroids:
    schema: NumpyArray
    description: Cluster centers (n_clusters x n_features).
  inertia:
    schema: Float
    description: Sum of squared distances of samples to their nearest cluster center.

implementation:
  language: python
  entry_point: tool.py:run
  requires: [numpy, scikit-learn]

metadata:
  author: plurics-seeds
  stability: stable
  cost_class: medium
